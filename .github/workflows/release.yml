name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.7.0) — created at the dispatched ref if it doesn't exist"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "target=--target ${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "target=" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          python -m unittest discover -s tests -p "test_*.py"

      - name: Build distributions
        run: |
          pip install build
          python -m build

      - name: Build release notes from CHANGELOG
        run: python scripts/extract_changelog.py "${{ steps.meta.outputs.tag }}" > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" dist/* \
            ${{ steps.meta.outputs.target }} \
            --title "${{ steps.meta.outputs.tag }}" \
            --notes-file release-notes.md
